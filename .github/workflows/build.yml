name: Test, Build & Publish Docker Image

on: push

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  test-build-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Repository auschecken
      - name: Checkout repository
        uses: actions/checkout@v6

      # 2. JDK einrichten
      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      # 3. Tests ausführen & Artefakt bauen
      - name: Build with Maven
        run: mvn --batch-mode package

      # 4. Testergebnisse im GitHub UI zeigen (auch bei Fehlschlag)
      - name: Publish Unit Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: target/surefire-reports/**/*.xml

      # 5. Docker Hub Login (nur auf main)
      - name: Log in to Docker Hub
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 6. Docker Buildx einrichten (nur auf main)
      - name: Set up Docker Buildx
        if: github.ref == 'refs/heads/main'
        uses: docker/setup-buildx-action@v4

      # 7. Docker Image bauen & pushen (nur auf main)
      - name: Build and push Docker image
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/spring-boot-admin:latest